trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  acrName: acrdevplatform001
  acrLoginServer: acrdevplatform001.azurecr.io
  imageRepository: flaskapp
  imageTag: $(Build.BuildId)

stages:

- stage: Build
  displayName: Build and Push Image

  jobs:
  - job: BuildPush
    displayName: Build and Push

    steps:

    - checkout: self

    - task: AzureCLI@2
      displayName: Build and Push Image to ACR
      inputs:
        azureSubscription: azure-devops-connection
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(acrName)

          docker build \
            -t $(acrLoginServer)/$(imageRepository):$(imageTag) \
            -f app/Dockerfile \
            ./app

          docker push \
            $(acrLoginServer)/$(imageRepository):$(imageTag)

- stage: Deploy
  displayName: Deploy to AKS

  dependsOn: Build
  condition: succeeded()

  jobs:
  - job: DeployAKS
    displayName: Deploy Application

    steps:

    - task: AzureCLI@2
      displayName: Deploy to Kubernetes
      inputs:
        azureSubscription: azure-devops-connection
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az aks get-credentials \
            --resource-group rg-dev-platform-eastus \
            --name aks-dev-platform \
            --overwrite-existing

          kubectl get nodes

          kubectl apply -f kubernetes/flask-deployment.yaml

          kubectl apply -f kubernetes/flask-service.yaml

          kubectl set image deployment/flaskapp \
            flaskapp=$(acrLoginServer)/$(imageRepository):$(imageTag) \
            -n demo

          kubectl rollout status deployment/flaskapp -n demo

          kubectl get pods -n demo

          kubectl get svc -n demo